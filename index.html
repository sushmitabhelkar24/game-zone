const canvasSize = 400;

        event.preventDefault();

});

function changeDirection(event) {
    if (event.key === "ArrowLeft" && direction !== "RIGHT") {
        direction = "LEFT";
    } else if (event.key === "ArrowUp" && direction !== "DOWN") {
        direction = "UP";
    } else if (event.key === "ArrowRight" && direction !== "LEFT") {
        direction = "RIGHT";
    } else if (event.key === "ArrowDown" && direction !== "UP") {
        direction = "DOWN";
    }
}

function randomFood() {
    return {
        x: Math.floor(Math.random() * 20) * box,
        y: Math.floor(Math.random() * 20) * box
    };

        headY >= canvasSize ||

    ) {

        alert("Game Over! Final Score: " + score);
        return;
    }

    let newHead = { x: headX, y: headY };

    if (headX === food.x && headY === food.y) {
        score++;
        document.getElementById("score").innerText = score;
        food = randomFood();
    } else {
        snake.pop();
    }

    snake.unshift(newHead);
}

function collision(x, y, array) {
    for (let i = 1; i < array.length; i++) {
        if (x === array[i].x && y === array[i].y) {
            return true;
        }
    }
    return false;
}

    initGame();

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player, bullets, enemies, score, lives, gameOver;
let enemySpawnRate = 1000;

function init() {
    player = { x: 180, y: 550, width: 40, height: 20, speed: 6 };
    bullets = [];
    enemies = [];
    score = 0;
    lives = 3;
    gameOver = false;
    enemySpawnRate = 1000;

    document.getElementById("score").innerText = score;
    document.getElementById("lives").innerText = lives;
}

init();

// Controls
let keys = {};
document.addEventListener("keydown", (e) => {
    keys[e.code] = true;

    if (e.code === "Space" && !gameOver) {
        bullets.push({
            x: player.x + player.width / 2 - 2,
            y: player.y,
            width: 4,
            height: 10
        });
    }
});
document.addEventListener("keyup", (e) => {
    keys[e.code] = false;
});

function spawnEnemy() {
    if (!gameOver) {
        enemies.push({
            x: Math.random() * 360,
            y: 0,
            width: 40,
            height: 20,
            speed: 2 + Math.random() * 2
        });
    }
}

function update() {
    if (gameOver) return;

    // Move player
    if (keys["ArrowLeft"] && player.x > 0)
        player.x -= player.speed;

    if (keys["ArrowRight"] && player.x < canvas.width - player.width)
        player.x += player.speed;

        bullet.y -= 8;

            enemies.splice(eIndex, 1);
            lives--;

                gameOver = true;
                alert("Game Over! Final Score: " + score);
            }
        }

        // Collision

            if (
                bullet.x < enemy.x + enemy.width &&
                bullet.x + bullet.width > enemy.x &&
                bullet.y < enemy.y + enemy.height &&
                bullet.y + bullet.height > enemy.y

                bullets.splice(bIndex, 1);

                document.getElementById("score").innerText = score;

                // Increase difficulty every 10 points
                if (score % 10 === 0) {
                    clearInterval(spawnInterval);
                    enemySpawnRate -= 100;
                    if (enemySpawnRate < 300) enemySpawnRate = 300;
                    spawnInterval = setInterval(spawnEnemy, enemySpawnRate);
                }
            }
        });
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Player

    enemies.forEach(enemy =>
        ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height)
    );
}

<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #111;
            color: white;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 5px;
            justify-content: center;
            margin-top: 20px;
        }

        .cell {
            width: 100px;
            height: 100px;
            background: #222;
            font-size: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>

<h1>❌⭕ Tic Tac Toe</h1>
<h2 id="status">Player X's Turn</h2>

<div class="board" id="board"></div>

<button onclick="restartGame()">Restart Game</button>

<script>
let board = ["", "", "", "", "", "", "", "", ""];
let currentPlayer = "X";
let gameActive = true;

const statusText = document.getElementById("status");
const boardContainer = document.getElementById("board");

// Winning patterns
const winningConditions = [
    [0,1,2],
    [3,4,5],
    [6,7,8],
    [0,3,6],
    [1,4,7],
    [2,5,8],
    [0,4,8],
    [2,4,6]
];

// Create board
function createBoard() {
    boardContainer.innerHTML = "";
    board.forEach((cell, index) => {
        const cellDiv = document.createElement("div");
        cellDiv.classList.add("cell");
        cellDiv.innerText = cell;
        cellDiv.addEventListener("click", () => handleClick(index));
        boardContainer.appendChild(cellDiv);
    });
}

function handleClick(index) {
    if (board[index] !== "" || !gameActive) return;

    board[index] = currentPlayer;
    checkWinner();
    currentPlayer = currentPlayer === "X" ? "O" : "X";
    if (gameActive) {
        statusText.innerText = "Player " + currentPlayer + "'s Turn";
    }
    createBoard();
}

function checkWinner() {
    for (let condition of winningConditions) {
        let [a, b, c] = condition;

        if (
            board[a] !== "" &&
            board[a] === board[b] &&
            board[b] === board[c]
        ) {
            statusText.innerText = "Player " + board[a] + " Wins!";
            gameActive = false;
            return;
        }
    }

    if (!board.includes("")) {
        statusText.innerText = "It's a Draw!";
        gameActive = false;
    }
}

function restartGame() {
    board = ["", "", "", "", "", "", "", "", ""];
    currentPlayer = "X";
    gameActive = true;
    statusText.innerText = "Player X's Turn";
    createBoard();
}

createBoard();
</script>
